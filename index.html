<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ovilli</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div id="gate">
    <div class="gate-box">
        <h2 id="gate-title">Quick human check</h2>
        <p id="gate-copy">Please verify before entering the site.</p>
        <div id="turnstile-box"></div>
    </div>
</div>

<header class="site-header" id="main-header">
    <div class="header-brand">
        <div class="olive-icon">
            <img src="assets/olive-svgrepo-com.svg" alt="Olive Icon">
        </div>
        <div>
            <div class="olive-text">Ovilli</div>
            <p class="brand-subline" id="brand-subline"></p>
        </div>
    </div>

        <div class="header-actions">
            <a href="olives.html" class="olive-page-link" id="olive-page-link">About olives</a>
            <div class="language-btn">
                <button id="lang-toggle">DE</button>
            </div>
        </div>
</header>
<div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>

<main>
    <section class="hero">
        <p class="hero-eyebrow" id="hero-eyebrow"></p>
        <h1 id="hero-title"></h1>
        <p class="hero-copy" id="hero-copy"></p>
        <div class="hero-actions">
            <a id="hero-cta-primary" class="hero-btn hero-btn-primary" href="#contact"></a>
            <a id="hero-cta-secondary" class="hero-btn" href="https://github.com/ovilli" target="_blank" rel="noreferrer"></a>
        </div>
        <div class="hero-highlights">
            <span class="hero-chip" id="hero-chip-1"></span>
            <span class="hero-chip" id="hero-chip-2"></span>
            <span class="hero-chip" id="hero-chip-3"></span>
        </div>
    </section>

    <nav id="about-nav" class="section-nav"></nav>
    <section class="about-content" id="about-content"></section>
</main>

<button id="back-to-top" class="back-to-top" aria-label="Back to top">
    <i class="fas fa-arrow-up"></i>
</button>

<footer class="olive-footer">
    <div class="footer-links">
        <a href="privacy.html">Privacy & Cookies</a>
        <span class="footer-separator">•</span>
        <a href="impressum.html">Impressum</a>
    </div>
    <div class="footer-text" id="footer-text">Official Website of Ovilli</div>
    <a href="https://github.com/ovilli" target="_blank" rel="noreferrer" class="footer-icon">
        <i class="fab fa-github"></i>
    </a>
</footer>

    <div class="bg-bubble bg-bubble-1"></div>
    <div class="bg-bubble bg-bubble-2"></div>
    <div class="bg-bubble bg-bubble-3"></div>
    <script src="js/index.js"></script>
</body>
</html>
